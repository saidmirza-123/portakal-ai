<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portakal AI | Mirza Edition</title>
    <style>
        :root { --p: #FF8C00; --bg: #121212; --card: #1e1e1e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .chat-container { width: 100%; max-width: 700px; background: var(--card); border-radius: 20px; border: 2px solid var(--p); display: flex; flex-direction: column; height: 75vh; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { background: var(--p); padding: 15px; text-align: center; font-size: 1.5em; font-weight: bold; color: black; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 85%; line-height: 1.5; }
        .user { align-self: flex-end; background: #333; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--p); color: black; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        .input-area { padding: 20px; background: #1a1a1a; display: flex; gap: 10px; border-top: 1px solid #333; }
        input[type="text"] { flex: 1; background: #252525; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; outline: none; }
        button { background: var(--p); border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .admin-section { margin-top: 20px; width: 100%; max-width: 700px; padding: 15px; background: #1e1e1e; border: 1px dashed var(--p); border-radius: 10px; }
        .download-btn { background: #4CAF50; color: white; display: none; margin: 10px auto; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">🍊 Portakal AI v3</div>
        <div class="messages" id="chat">
            <div class="msg ai">Selam Mirza! Ben Portakal AI. Hafızam açık ve kod yazmaya hazırım. Arkadaşlarınla beraber beni kullanabilirsin!</div>
        </div>
        <a id="dlBtn" class="download-btn" href="/download">💾 Üretilen Kodu İndir (.py)</a>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Bir şey sor veya 'Kod yaz' de...">
            <button onclick="ask()">Gönder</button>
        </div>
    </div>

    <div class="admin-section">
        <h3 style="margin-top:0;">🔐 Öğretme Paneli (Admin)</h3>
        <div style="display: flex; flex-wrap: wrap; gap: 10px;">
            <input type="password" id="adminPass" placeholder="Şifre (admin123)" style="background:#252525; color:white; border:1px solid #444; padding:5px; border-radius:5px;">
            <input type="text" id="tQuest" placeholder="Soru (Örn: Mirza kim?)" style="background:#252525; color:white; border:1px solid #444; padding:5px; border-radius:5px; flex:1;">
            <input type="text" id="tAnsw" placeholder="Cevap (Örn: Portakal AI'nın babası!)" style="background:#252525; color:white; border:1px solid #444; padding:5px; border-radius:5px; flex:1;">
            <button onclick="teach()" style="background: #555;">Hafızaya Kaydet</button>
        </div>
    </div>

    <script>
        async function ask() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const q = input.value.trim();
            if(!q) return;

            chat.innerHTML += `<div class="msg user">${q}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            const res = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question: q})
            });
            const data = await res.json();
            
            chat.innerHTML += `<div class="msg ai">${data.answer}</div>`;
            if(data.file) document.getElementById('dlBtn').style.display = 'block';
            else document.getElementById('dlBtn').style.display = 'none';
            chat.scrollTop = chat.scrollHeight;
        }

        async function teach() {
            const pass = document.getElementById('adminPass').value;
            const q = document.getElementById('tQuest').value;
            const a = document.getElementById('tAnsw').value;

            const res = await fetch('/teach', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({pass: pass, q: q, a: a})
            });
            const data = await res.json();
            if(data.status === "ok") {
                alert("Portakal AI bunu hafızasına kazıdı!");
                document.getElementById('tQuest').value = "";
                document.getElementById('tAnsw').value = "";
            } else {
                alert("Şifre yanlış Mirza!");
            }
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') ask();
        });
    </script>
</body>
</html>
